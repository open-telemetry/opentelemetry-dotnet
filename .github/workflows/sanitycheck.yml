# Called by ci.yml to perform general linting
# See: https://docs.github.com/en/actions/using-workflows/reusing-workflows#creating-a-reusable-workflow
name: Lint - Spelling & Encoding

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-typos:
    runs-on: ubuntu-24.04

    steps:
    - name: check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: check for typos
      uses: crate-ci/typos@7c572958218557a3272c2d6719629443b5cc26fd # v1.45.2

  run-sanitycheck:
    runs-on: ubuntu-24.04

    steps:
    - name: check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: detect non-ASCII encoding and trailing space
      run: python3 ./build/scripts/sanitycheck.py
