name: codeql-analysis-steps

on:
  workflow_call:
    inputs:
      trigger:
        required: true
        type: string

permissions: {}

jobs:
  analyze:
    name: 'Analyze ${{ matrix.language }}'
    permissions:
      actions: read # Scan GitHub Actions workflows
      contents: read # Checkout the repository
      security-events: write # Store results in the Security tab
    runs-on: windows-2025

    strategy:
      fail-fast: ${{ inputs.trigger == 'merge_group' }}
      matrix:
        language: ['actions', 'csharp']

    steps:
      - name: Configure Pagefile
        if: matrix.language == 'csharp'
        uses: al-cheb/configure-pagefile-action@9b6da52fb72a3c6147c1aad2df22d8d905681adc # v1.5
        with:
          minimum-size: 8GB
          maximum-size: 32GB
          disk-root: "D:"

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          build-mode: none
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:${{ matrix.language }}'

  results:
    name: results
    if: ${{ !cancelled() }}
    needs: [ analyze ]
    runs-on: ubuntu-24.04

    steps:
      - name: Report status
        shell: bash
        env:
          SCAN_SUCCESS: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "${SCAN_SUCCESS}" == "true" ]
          then
            echo 'CodeQL analysis successful'
          else
            echo 'CodeQL analysis failed'
            exit 1
          fi
