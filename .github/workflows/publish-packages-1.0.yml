#################################################
################### IMPORTANT ###################
# DON'T RENAME THIS FILE UNLESS WE START
# RELEASING THE VERSION 2.*
################### IMPORTANT ###################
#################################################

name: Build, pack, and publish to MyGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'core-*'
      - 'coreunstable-*'
  schedule:
    - cron: '0 0 * * *' # Once a day at 00:00 UTC

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  automation:
    if: github.event_name != 'schedule' || (github.event_name == 'schedule' && github.event.repository.fork == false)
    uses: ./.github/workflows/automation.yml
    permissions:
      contents: read
    secrets:
      OTELBOT_DOTNET_PRIVATE_KEY: ${{ secrets.OTELBOT_DOTNET_PRIVATE_KEY }}

  build-pack:
    name: Build and pack
    if: github.event_name != 'schedule' || (github.event_name == 'schedule' && github.event.repository.fork == false)
    runs-on: windows-2025

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COSIGN_YES: "yes"

    outputs:
      artifact-url: ${{ steps.upload-artifacts.outputs.artifact-url }}
      artifact-id: ${{ steps.upload-artifacts.outputs.artifact-id }}
      dotnet-sdk-version: ${{ steps.setup-dotnet.outputs.dotnet-version }}

    permissions:
      artifact-metadata: write # Publish artifact metadata for the uploaded packages
      attestations: write # Create GitHub attestations for the build outputs
      contents: read # Checkout the repository
      id-token: write # Sign packages and attestations with GitHub OIDC

    steps:
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        # Note: By default GitHub only fetches 1 commit. MinVer needs to find
        # the version tag which is typically NOT on the first commit so we
        # retrieve them all.
        fetch-depth: 0
        persist-credentials: false
        show-progress: false

    - name: Get Git commit timestamp
      id: get-commit-timestamp
      shell: pwsh
      run: |
        "epoch=$(git log -1 --pretty=%ct)" >> ${env:GITHUB_OUTPUT}

    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      id: setup-dotnet

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: dotnet restore
      run: dotnet restore ./build/OpenTelemetry.proj -p:RunningDotNetPack=true

    - name: dotnet build
      shell: pwsh
      run: dotnet build ./build/OpenTelemetry.proj --configuration Release --no-restore -p:Deterministic=true -p:"BuildNumber=${env:GITHUB_RUN_NUMBER}" -p:RunningDotNetPack=true

    - name: Sign DLLs with Cosign Keyless
      shell: pwsh
      run: |
        $projectFiles = Get-ChildItem -Path src/*/*.csproj -File

        foreach ($projectFile in $projectFiles) {
            $projectName = [System.IO.Path]::GetFileNameWithoutExtension($projectFile)

            Get-ChildItem -Path artifacts/bin/$projectName/release_*/$projectName.dll -File | ForEach-Object {
                $fileFullPath = $_.FullName
                Write-Output "Signing $fileFullPath"

                cosign.exe sign-blob --yes --bundle "$fileFullPath.sigstore.json" $fileFullPath
            }
        }

    - name: Create GitHub attestations for DLLs
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
      with:
        subject-path: |
          ./artifacts/bin/*/release_*/OpenTelemetry*.dll

    - name: dotnet pack
      shell: pwsh
      env:
        PACK_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        SOURCE_DATE_EPOCH: ${{ steps.get-commit-timestamp.outputs.epoch }}
      run: dotnet pack ./build/OpenTelemetry.proj --configuration Release --no-restore --no-build -p:"PackTag=${env:PACK_TAG}"

    - name: Create GitHub attestations for NuGet packages
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
      with:
        subject-path: |
          ./artifacts/package/release/OpenTelemetry*.*nupkg

    - name: Generate SBOM
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        output-file: ./artifacts/package/release/sbom.spdx.json
        path: ./artifacts/bin
        upload-artifact: false
        upload-release-assets: false

    - name: Create GitHub attestation for SBOM
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
      with:
        subject-path: |
          ./artifacts/package/release/sbom.spdx.json

    - name: Publish Artifacts
      id: upload-artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ github.ref_name }}-packages
        path: ./artifacts/package/release
        if-no-files-found: error

  validate:
    name: Validate NuGet packages
    needs: [build-pack]
    runs-on: windows-2025

    permissions:
      attestations: read # Verify GitHub attestations for the build outputs
      contents: read # Download the published artifacts

    steps:

    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        dotnet-version: ${{ needs.build-pack.outputs.dotnet-sdk-version }}

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Install NuGet package validation tools
      env:
        # renovate: datasource=nuget depName=dotnet-validate
        DOTNET_VALIDATE_VERSION: '0.0.1-preview.582'
        # renovate: datasource=nuget depName=Meziantou.Framework.NuGetPackageValidation.Tool
        MEZIANTOU_VALIDATE_NUGET_PACKAGE_VERSION: '1.0.52'
      shell: pwsh
      run: |
        dotnet tool install --global dotnet-validate --version ${env:DOTNET_VALIDATE_VERSION} --allow-roll-forward
        dotnet tool install --global Meziantou.Framework.NuGetPackageValidation.Tool --version ${env:MEZIANTOU_VALIDATE_NUGET_PACKAGE_VERSION} --allow-roll-forward

    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        artifact-ids: ${{ needs.build-pack.outputs.artifact-id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: ./artifacts

    - name: Validate NuGet packages
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $packages = Get-ChildItem -Path "./artifacts/*.nupkg" -File | ForEach-Object { $_.FullName }
        if (-not $packages) {
          Write-Output "::error::No NuGet packages were found in the downloaded artifacts."
          exit 1
        }
        $invalidPackages = 0
        foreach ($package in $packages) {
          $isValid = $true
          dotnet validate package local $package
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::validate package local failed for $package."
            $isValid = $false
          }
          meziantou.validate-nuget-package $package --github-token ${env:GH_TOKEN}
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::meziantou.validate-nuget-package failed for $package."
            $isValid = $false
          }
          if (-Not $isValid) {
            $invalidPackages++
          }
        }
        if ($invalidPackages -gt 0) {
          Write-Output "::error::$invalidPackages NuGet package(s) failed validation."
          exit 1
        }

    - name: Verify package DLL Cosign Keyless signatures
      shell: pwsh
      env:
        CERTIFICATE_IDENTITY: "${{ github.server_url }}/${{ github.repository }}/.github/workflows/publish-packages-1.0.yml@${{ github.ref }}"
        CERTIFICATE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
        COSIGN_YES: "yes"
      run: |
        $nupkgFiles = Get-ChildItem -Path "./artifacts/*.nupkg" -File

        # Copy the NuGet packages to a temporary directory and extract them
        $tempDir = New-Item -ItemType Directory -Path (Join-Path -Path ${env:RUNNER_TEMP} -ChildPath ([System.Guid]::NewGuid().ToString()))
        foreach ($nupkgFile in $nupkgFiles) {
            $nupkgFilePath = $nupkgFile.FullName
            $packageName = [System.IO.Path]::GetFileNameWithoutExtension($nupkgFilePath)
            Write-Output "Extracting $nupkgFilePath"
            Expand-Archive -Path $nupkgFilePath -DestinationPath (Join-Path $tempDir.FullName $packageName)
        }

        # Iterate over all DLL files in the extracted packages and verify their signatures
        $dllFiles = Get-ChildItem -Path $tempDir.FullName -Recurse -Filter *.dll -File
        foreach ($dllFile in $dllFiles) {
            $dllFilePath = $dllFile.FullName
            Write-Output "Verifying $dllFilePath"
            cosign.exe verify-blob `
              --bundle "$dllFilePath.sigstore.json" `
              --certificate-identity ${env:CERTIFICATE_IDENTITY} `
              --certificate-oidc-issuer ${env:CERTIFICATE_OIDC_ISSUER} `
              --use-signed-timestamps `
              $dllFilePath
            if ($LASTEXITCODE -ne 0) {
                Write-Output "::error::Signature verification failed for $dllFilePath."
                exit 1
            }
            Write-Output "Signature verification succeeded for $dllFilePath"
        }

    - name: Verify artifact attestations
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Get-ChildItem -Path (Join-Path ${env:GITHUB_WORKSPACE} "artifacts") -Recurse -File | ForEach-Object {
          $target = $_.FullName
          gh attestation verify --repo ${env:GITHUB_REPOSITORY} $target
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::Attestation verification failed for ${target}."
            exit 1
          }
          Write-Output "Attestation verification succeeded for ${target}"
        }

  publish:
    name: Publish
    needs: [build-pack, validate]
    runs-on: ubuntu-24.04

    permissions:
      attestations: read # Read GitHub attestations for the NuGet packages
      contents: read # Download the published artifacts

    steps:

    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        dotnet-version: ${{ needs.build-pack.outputs.dotnet-sdk-version }}

    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        artifact-ids: ${{ needs.build-pack.outputs.artifact-id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: ./artifacts

    - name: Verify artifact attestations
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Get-ChildItem -Path (Join-Path ${env:GITHUB_WORKSPACE} "artifacts") -Recurse -File | ForEach-Object {
          $target = $_.FullName
          gh attestation verify --repo ${env:GITHUB_REPOSITORY} $target
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::Attestation verification failed for ${target}."
            exit 1
          }
          Write-Output "Attestation verification succeeded for ${target}"
        }

    - name: Publish MyGet
      working-directory: ./artifacts
      env:
        MYGET_TOKEN_EXISTS: ${{ secrets.MYGET_TOKEN != '' }}
        NUGET_API_KEY: ${{ secrets.MYGET_TOKEN }}
        SOURCE: https://www.myget.org/F/opentelemetry/api/v3/index.json
      if: env.MYGET_TOKEN_EXISTS == 'true' # Skip MyGet publish if run on a fork without the secret
      shell: pwsh
      run: dotnet nuget push *.nupkg --skip-duplicate --source ${env:SOURCE}

  post-build:
    name: Post build release tasks
    runs-on: ubuntu-24.04

    permissions:
      contents: read # Download the published artifacts

    needs:
    - automation
    - build-pack
    - publish
    - validate

    if: needs.automation.outputs.enabled && github.event_name == 'push'

    steps:
    - name: Generate GitHub App token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: otelbot-token
      with:
        client-id: ${{ vars.OTELBOT_DOTNET_CLIENT_ID }}
        private-key: ${{ secrets.OTELBOT_DOTNET_PRIVATE_KEY }}
        permission-contents: write
        permission-pull-requests: write

    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: true # zizmor: ignore[artipacked] Needed to push commits
        show-progress: false
        token: ${{ steps.otelbot-token.outputs.token }}

    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        artifact-ids: ${{ needs.build-pack.outputs.artifact-id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: ./artifacts

    - name: Create GitHub Release draft
      shell: pwsh
      env:
        GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
      run: |
        Import-Module .\build\scripts\post-release.psm1

        CreateDraftRelease `
          -gitRepository ${env:GITHUB_REPOSITORY} `
          -tag ${env:GITHUB_REF_NAME} `
          -releaseFiles "${env:GITHUB_WORKSPACE}/artifacts/*"

    - name: Post notice when packages are ready
      shell: pwsh
      env:
        GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        EXPECTED_PR_AUTHOR_USER_NAME: ${{ needs.automation.outputs.application-name }}
        EXPECTED_COMMENT_AUTHOR_USER_NAME: ${{ needs.automation.outputs.application-login }}
        PACKAGES_URL: ${{ needs.build-pack.outputs.artifact-url }}
      run: |
        Import-Module .\build\scripts\post-release.psm1

        TryPostPackagesReadyNoticeOnPrepareReleasePullRequest `
          -gitRepository ${env:GITHUB_REPOSITORY} `
          -tag ${env:GITHUB_REF_NAME} `
          -tagSha ${env:GITHUB_SHA} `
          -packagesUrl ${env:PACKAGES_URL} `
          -expectedPrAuthorUserName ${env:EXPECTED_PR_AUTHOR_USER_NAME} `
          -expectedCommentAuthorUserName ${env:EXPECTED_COMMENT_AUTHOR_USER_NAME}
