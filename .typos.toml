[default.extend-words]
# "ba" appears in example trace IDs (e.g., "00f067aa0ba902b7")
ba = "ba"
# "caf" appears in "café" encoded as Latin-1 in a test string
caf = "caf"
# "Delt" appears in "DeltA" test string for case-insensitive Delta parsing
Delt = "Delt"
# "Alway" appears in truncated benchmark result table output
Alway = "Alway"
# "Enumerables" is the valid plural of "Enumerable" used in a method name
Enumerables = "Enumerables"
